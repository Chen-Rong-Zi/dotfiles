numbered_command = false

use_trash = true
watch_files = true
xdg_open = false
xdg_open_fork = true

[display]
# default, hsplit
mode = "default"

automatically_count_files = true
collapse_preview = false
# ratios for parent view (optional), current view and preview
column_ratio = [2, 4, 4]
scroll_offset = 6
show_borders = true
show_hidden = false
show_icons = true
tilde_in_titlebar = true
# none, absolute, relative
line_number_style = "none"

# size, mtime, user, gourp, perm. can be combined with |. 
# `none` to disable, `all` to enable all
# all and none can't be combined with other options
linemode = "size"

[display.sort]
# lexical, mtime, natural, size, ext
sort_method = "mtime"
case_sensitive = false
directories_first = true
reverse = true

[preview]
max_preview_size = 20480000                           # 2MB
preview_script = "/home/rongzi/.config/joshuto/preview_file.sh"
# preview_protocol = "disabled"

preview_shown_hook_script = "/home/rongzi/.config/joshuto/on_preview_shown.sh" # make sure it's marked as executable
preview_removed_hook_script = "/home/rongzi/.config/joshuto/on_preview_removed.sh" # make sure it's marked as executable

[search]
# insensitive, sensitive, smart
string_case_sensitivity = "insensitive"
# see above
glob_case_sensitivity = "sensitive"
# see above
fzf_case_sensitivity = "insensitive"

[tab]
# inherit, home, root
home_page = "home"



